// ── Atalhos de teclado ──────────────────────────────────────
// F2 = Abrir Balcão  |  F3 = Abrir Delivery  |  F6 = Adicionar Açaí (modal Balcão)  |  Esc = Fechar modal
document.addEventListener('keydown', function(e){
  var tag=(document.activeElement&&document.activeElement.tagName)||'';

  // F4 e F5 funcionam mesmo com campo focado (finalizar venda)
  if(e.key==='F6'){
    e.preventDefault();
    var mBalcaoF6=document.getElementById('modalBalcao');
    if(mBalcaoF6&&mBalcaoF6.classList.contains('open')) adicionarAcaiBalcao();
    return;
  }
  if(e.key==='F4'){
    e.preventDefault();
    var mBalcao=document.getElementById('modalBalcao');
    if(mBalcao&&mBalcao.classList.contains('open')) finalizarBalcao();
    return;
  }
  if(e.key==='F5'){
    e.preventDefault();
    var mDel=document.getElementById('modalDeliveryPDV');
    if(mDel&&mDel.classList.contains('open')) finalizarDeliveryPDV();
    return;
  }

  // Enter dentro dos modais PDV — atalhos de produtividade
  if(e.key==='Enter'){
    var mBalcaoOpen = document.getElementById('modalBalcao')&&document.getElementById('modalBalcao').classList.contains('open');
    var mDelOpen    = document.getElementById('modalDeliveryPDV')&&document.getElementById('modalDeliveryPDV').classList.contains('open');

    // Se o campo ativo é o de peso bruto, avança para campo valor pago
    if(mBalcaoOpen && document.activeElement && document.activeElement.id==='b_pesoBruto'){
      e.preventDefault();
      var vp=document.getElementById('b_valorPago');
      if(vp){ vp.focus(); vp.select(); }
      return;
    }
    // Se o campo ativo é o de valor pago no balcão, finaliza
    if(mBalcaoOpen && document.activeElement && document.activeElement.id==='b_valorPago'){
      e.preventDefault();
      finalizarBalcao();
      return;
    }
    // Se o campo ativo é valor pago no delivery, finaliza
    if(mDelOpen && document.activeElement && document.activeElement.id==='d_valorPago'){
      e.preventDefault();
      finalizarDeliveryPDV();
      return;
    }
  }

  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
  // 1/2/3 = selecionam pagamento quando modal PDV estiver aberto e sem campo ativo
  var mBOpen = document.getElementById('modalBalcao')&&document.getElementById('modalBalcao').classList.contains('open');
  var mDOpen = document.getElementById('modalDeliveryPDV')&&document.getElementById('modalDeliveryPDV').classList.contains('open');
  if((mBOpen||mDOpen)&&(e.key==='1'||e.key==='2'||e.key==='3')){
    e.preventDefault();
    var grupo = mBOpen ? 'b_pgto' : 'd_pgto';
    var mapa  = {'1':'PIX','2':'CARTAO','3':'DINHEIRO'};
    selecionarPgto(grupo, mapa[e.key]);
    return;
  }

  if(e.key==='F2'){
    e.preventDefault();
    if(typeof abrirPDVBalcao==='function' && ST.abaAtiva==='abaPedidos') abrirPDVBalcao();
  }
  if(e.key==='F3'){
    e.preventDefault();
    if(typeof abrirPDVDelivery==='function' && ST.abaAtiva==='abaPedidos') abrirPDVDelivery();
  }
  if(e.key==='Escape'){
    var abertos=document.querySelectorAll('.modal-overlay.open');
    if(abertos.length){
      var ultimo=abertos[abertos.length-1];
      var btn=ultimo.querySelector('.modal-close');
      if(btn) btn.click();
    }
  }
});

    if(!p && ST.dados && ST.dados.deliveryAtivo) p = ST.dados.deliveryAtivo.find(function(x){return x.ID_Venda === id;});

function imprimirCupom(pedido) {
    if(!pedido) return;
    var janela = window.open('', '_blank', 'width=320,height=600');
    var cli = {}; try{ cli = JSON.parse(pedido.Cliente_Info||'{}'); }catch(e){}
    var itens = []; try{ itens = JSON.parse(pedido.Itens_Comprados||'[]'); }catch(e){}
    var dataHora = pedido.Data_Hora || '--';
    var cfg = ST.dados.configuracoes || {};
    
    // Captura os dados do seu sistema de forma limpa
    var logoHTML = cfg.URL_Logo ? '<img src="' + cfg.URL_Logo + '" style="max-width:90px; max-height:90px; border-radius:12px; margin:0 auto 10px; display:block; filter: grayscale(100%);">' : '';
    var nomeLoja = cfg.Nome_Loja || 'Nossa Loja';
    var telHTML = cfg.WhatsApp_Numero ? '<div style="margin-top:2px;">📱 ' + cfg.WhatsApp_Numero + '</div>' : '';
    var endHTML = cfg.Endereco_Loja ? '<div style="margin-top:4px;">📍 ' + cfg.Endereco_Loja + '</div>' : '';
    var insta = cfg.Instagram_URL ? cfg.Instagram_URL.replace(/\/$/, '').split('/').pop() : '';
    var instaHTML = insta ? '<div style="margin-top:4px;">📸 @' + insta + '</div>' : '';

    // Estilo preparado para Bobina Térmica
    var html = '<html><head><title>Cupom</title><style>body{font-family:"Courier New", Courier, monospace;width:300px;margin:0 auto;padding:15px 10px;color:#000;font-size:13px;line-height:1.4;} .center{text-align:center;} .linha{border-bottom:1px dashed #000;margin:12px 0;} .flex{display:flex;justify-content:space-between;align-items:flex-end;} .bold{font-weight:bold;} .badge{border: 1px solid #000; padding:2px 6px; border-radius:4px; font-size:11px;} @media print { body { width: 100%; margin: 0; padding: 0; } }</style></head><body>';
    
    // --- Cabeçalho da Loja ---
    html += '<div class="center">' + logoHTML + '<h2 style="margin:0 0 5px;font-size:18px;">' + nomeLoja + '</h2>' + telHTML + endHTML + instaHTML + '</div>';
    html += '<div class="linha"></div>';
    
    // --- Dados do Pedido ---
    html += '<h2 class="center" style="margin:5px 0;font-size:22px;">PEDIDO: #' + (pedido.ID_Venda||'') + '</h2>';
    html += '<div class="center" style="font-size:11px;margin-bottom:12px;">' + dataHora + '</div>';
    
    html += '<div>';
    if(cli.nome) html += '<div class="bold">👤 ' + cli.nome + '</div>';
    if(cli.telefone) html += '<div>📞 ' + cli.telefone + '</div>';
    if(cli.endereco) html += '<div style="margin-top:4px;">🚚 ' + cli.endereco + '</div>';
    html += '<div style="margin-top:6px;">📍 Origem: <span class="badge">' + (pedido.Origem||'--') + '</span></div>';
    html += '</div><div class="linha"></div>';
    
    // --- Lista de Itens ---
    html += '<div class="bold" style="margin-bottom:8px; font-size:14px;">RESUMO DO PEDIDO:</div>';
    itens.forEach(function(i) {
        html += '<div class="flex bold" style="margin-top:6px;"><span>• ' + (i.descricao||i.nome||'') + '</span><span>' + fmtMoeda(i.preco) + '</span></div>';
        if(i.detalhes) html += '<div style="font-size:11px;color:#333;margin-left:12px;margin-bottom:2px;">↳ ' + i.detalhes + '</div>';
    });
    
    html += '<div class="linha"></div>';
    
    // --- Fechamento de Valores ---
    if(parseFloat(pedido.Subtotal||0) > 0) html += '<div class="flex"><span>Subtotal:</span><span>' + fmtMoeda(pedido.Subtotal) + '</span></div>';
    if(parseFloat(pedido.Desconto||0) > 0) html += '<div class="flex"><span>Desconto:</span><span>-' + fmtMoeda(pedido.Desconto) + '</span></div>';
    if(parseFloat(pedido.Taxa_Entrega||0) > 0) html += '<div class="flex"><span>Taxa Entrega:</span><span>' + fmtMoeda(pedido.Taxa_Entrega) + '</span></div>';
    
    html += '<div class="linha"></div>';
    html += '<div class="flex bold" style="font-size:17px; background:#000; color:#fff; padding: 4px;"><span>TOTAL:</span><span>' + fmtMoeda(pedido.Total_Final) + '</span></div>';
    
    // --- Pagamento ---
    html += '<div class="linha"></div>';
    html += '<div class="center">Forma de Pagamento:<br><span class="bold" style="font-size:15px; text-transform:uppercase;">' + (pedido.Metodo_Pagamento||'--') + '</span></div>';
    
    // --- Rodapé ---
    html += '<div class="linha"></div>';
    html += '<div class="center" style="font-size:11px;margin-top:15px;">Desenvolvido por <b>AlyxSoftwares</b><br>Obrigado pela preferência! ❤️</div>';
    
    html += '</body></html>';
    
    janela.document.write(html);
    janela.document.close();
    janela.focus();
    setTimeout(function(){ janela.print(); janela.close(); }, 800);
}

function imprimirUltimaVendaBalcao() {
    if(window._ultimoPedidoBalcao) imprimirCupom(window._ultimoPedidoBalcao);
    else toast('Nenhuma venda recente para imprimir.', 'warn');
}

function abrirCarteiraEntregador() {
    var ativos = (ST.dados && ST.dados.deliveryAtivo) || [];
    var concluidos = (ST.dados && ST.dados.pedidosDia && ST.dados.pedidosDia.pedidos) || [];
    var todosPedidos = concluidos.concat(ativos);
    
    // Remove duplicados caso existam nas duas listas
    var map = {};
    var unicos = todosPedidos.filter(function(p) { if(map[p.ID_Venda]) return false; map[p.ID_Venda]=true; return true; });

    var minhasEntregas = unicos.filter(function(p) {
                var st = (p.Status||'').toUpperCase();
                var origem = (p.Origem||'').toUpperCase();
                
                // Usa estritamente o nome do Entregador (evita puxar o Operador do caixa por engano)
                var entregador = (p.Entregador_Nome || '').toLowerCase().trim();
                var meuNome = (ST.usuario.nome || '').toLowerCase().trim();
                
                // Aceita as entregas lançadas no PDV (DELIVERY) e as que vieram do App (ONLINE)
                return st === 'ENTREGUE' && (origem === 'DELIVERY' || origem === 'ONLINE') && entregador === meuNome;
            });

    var totalTaxas = minhasEntregas.reduce(function(sum, p) { return sum + parseFloat(p.Taxa_Entrega||0); }, 0);
    var html = '<div class="stat-grid mb-4"><div class="stat-card stat-green" style="padding:16px;"><div class="stat-icon" style="margin-bottom:8px;"><i class="fa-solid fa-money-bill-wave"></i></div><div class="stat-label">Total em Taxas (Hoje)</div><div class="stat-value">' + fmtMoeda(totalTaxas) + '</div><div class="stat-sub">' + minhasEntregas.length + ' entregas concluídas</div></div></div>';

    if(!minhasEntregas.length) {
        html += '<div class="empty-state"><i class="fa-solid fa-wallet"></i><p>Nenhuma entrega concluída hoje ainda.</p></div>';
    } else {
        html += '<div style="display:grid;gap:12px;max-height:50vh;overflow-y:auto;padding-right:5px;">' + minhasEntregas.map(function(p){
            var cli = parseCliente(p.Cliente_Info);
            return '<div class="pedido-card" style="margin:0;"><div class="pedido-card-header" style="margin:0;"><div><div class="pedido-card-id">' + esc(p.ID_Venda) + '</div><div class="pedido-card-cliente">' + esc(cli.nome||'Cliente') + '</div><div class="pedido-card-hora"><i class="fa-regular fa-clock"></i> ' + esc(fmtHora(p.Data_Hora)) + '</div></div><div><span class="badge badge-entregue">Taxa: ' + fmtMoeda(p.Taxa_Entrega) + '</span></div></div></div>';
        }).join('') + '</div>';
    }

    document.getElementById('modalFormTitle').innerHTML = '<i class="fa-solid fa-wallet text-green"></i> Minha Carteira (Hoje)';
    document.getElementById('modalFormBody').innerHTML = html;
    document.getElementById('modalFormFooter').innerHTML = '<button class="btn btn-secondary" onclick="fecharModal(\'modalFormCrud\')">Fechar</button>';
    abrirModal('modalFormCrud');
}
</script>
