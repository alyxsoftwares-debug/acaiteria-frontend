<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/png" href="logo-alyx.png">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Painel — AlyxSoftwares</title>
<link rel="apple-touch-icon" href="logo-alyx.png">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "c7565fa8-cd8c-4264-85b4-1a9d9cf150af",
    });
    
    // Associa o celular do entregador à loja e informa o cargo para isolar notificações
    try {
      var s = JSON.parse(sessionStorage.getItem('pdacai_user') || '{}');
      if (s.loja_id) {
        OneSignal.User.addTag("loja_id", s.loja_id);
        OneSignal.User.addTag("cargo", s.cargo || 'Operador');
      }
    } catch(e) {}
  });
</script>

<style>
  @media(max-width:600px){
  .modal-box{max-height:90dvh;overflow-y:auto;margin:5dvh auto}
  .pdv-grid{gap:12px}
  .form-row.cols-2{grid-template-columns:1fr}
}
@media(max-width:360px){
  #sidebar.collapsed .sidebar-bottom{ display:none; }
  .sidebar-bottom span, .sidebar-bottom a{ font-size:9px; }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0eeff;color:#1e1b4b;min-height:100vh;overflow-x:hidden}
:root{
  --purple-50:#f5f3ff;--purple-100:#ede9fe;--purple-200:#ddd6fe;--purple-300:#c4b5fd;
  --purple-400:#a78bfa;--purple-500:#8b5cf6;--purple-600:#7c3aed;--purple-700:#6d28d9;
  --purple-800:#5b21b6;--purple-900:#4c1d95;
  --grad-main:linear-gradient(135deg,#1a0533 0%,#2d0f5e 60%,#1a0533 100%);
  --grad-btn:linear-gradient(135deg,#7c3aed,#a855f7);
  --shadow-card:0 4px 24px rgba(109,40,217,.10);
  --shadow-btn:0 4px 16px rgba(124,58,237,.35);
  --radius:16px;--radius-sm:10px;
}

/* ── Scrollbar ─────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f0eeff}
::-webkit-scrollbar-thumb{background:#c4b5fd;border-radius:99px}

/* ── Layout ─────────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ─────────────────────────────────────────── */
#sidebar{
  width:260px;min-width:260px;background:var(--grad-main);
  display:flex;flex-direction:column;height:100vh;
  transition:width .3s ease;position:relative;z-index:100;
}
#sidebar.collapsed{width:72px;min-width:72px}
.sidebar-logo{
  padding:28px 20px 20px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.sidebar-logo .logo-icon{
  width:40px;height:40px;background:linear-gradient(135deg,#a855f7,#ec4899);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.sidebar-logo .logo-text{color:#fff;font-weight:800;font-size:14px;line-height:1.3;
  white-space:nowrap;overflow:hidden;transition:opacity .2s}
#sidebar.collapsed .logo-text{opacity:0;width:0}
.sidebar-user{
  padding:16px 20px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.user-avatar{
  width:36px;height:36px;background:linear-gradient(135deg,#7c3aed,#a855f7);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:14px;flex-shrink:0;
}
.user-avatar img{
  width:100%;height:100%;object-fit:cover;
  border-radius:50%;display:block;
}
.user-info{overflow:hidden;transition:opacity .2s}
.user-info .name{color:#fff;font-weight:700;font-size:13px;white-space:nowrap}
.user-info .cargo-badge{
  display:inline-block;background:rgba(168,85,247,.3);color:#d8b4fe;
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-top:2px;
}
#sidebar.collapsed .user-info{opacity:0;width:0}

nav.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
nav.sidebar-nav a{
  display:flex;align-items:center;gap:14px;padding:12px 20px;
  color:rgba(255,255,255,.6);text-decoration:none;font-weight:600;font-size:13.5px;
  border-radius:0;transition:all .2s;cursor:pointer;white-space:nowrap;
  border-left:3px solid transparent;
}
nav.sidebar-nav a:hover{color:#fff;background:rgba(255,255,255,.07)}
nav.sidebar-nav a.active{
  color:#fff;background:rgba(168,85,247,.25);border-left:3px solid #a855f7;
}
nav.sidebar-nav a i{font-size:16px;width:22px;text-align:center;flex-shrink:0}
nav.sidebar-nav .nav-label{overflow:hidden;transition:opacity .2s}
#sidebar.collapsed nav.sidebar-nav .nav-label{opacity:0;width:0}
nav.sidebar-nav .nav-sep{
  height:1px;background:rgba(255,255,255,.07);margin:8px 20px;
}

.sidebar-bottom{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
/* Créditos — esconde ao comprimir */
#sidebar.collapsed .sidebar-bottom .nav-label,
#sidebar.collapsed .sidebar-bottom span,
#sidebar.collapsed .sidebar-bottom a{
  opacity:0;
  width:0;
  overflow:hidden;
  display:none;
}
#sidebar.collapsed .sidebar-bottom{
  padding:12px 0;
  display:flex;
  align-items:center;
  justify-content:center;
}
#sidebar.collapsed .btn-logout{
  justify-content:center;
  padding:8px;
}
.btn-logout{
  display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.5);
  background:none;border:none;cursor:pointer;font-family:inherit;font-size:13px;
  font-weight:600;width:100%;padding:8px 0;transition:color .2s;
}
.btn-logout:hover{color:#f87171}
.btn-collapse{
  position:absolute;top:50%;right:-14px;transform:translateY(-50%);
  width:28px;height:28px;background:#7c3aed;border:2px solid #f0eeff;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:10;transition:all .2s;
}
.btn-collapse:hover{background:#6d28d9}
.btn-collapse i{color:#fff;font-size:11px;transition:transform .3s}
#sidebar.collapsed .btn-collapse i{transform:rotate(180deg)}

/* ── Main ───────────────────────────────────────────── */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.top-bar{
  background:#fff;padding:16px 28px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid #ede9fe;
  position:sticky;top:0;z-index:50;
}
.top-bar h1{font-size:22px;font-weight:800;color:#1e1b4b}
.top-bar p{color:#6b7280;font-size:13px;margin-top:2px}
.top-bar-actions{display:flex;align-items:center;gap:12px}
.btn-refresh{
  width:38px;height:38px;border-radius:10px;border:1.5px solid #ede9fe;
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#7c3aed;transition:all .2s;
}
.btn-refresh:hover{background:#f5f3ff;border-color:#c4b5fd}

.page-content{flex:1;padding:24px 28px}

/* ── Cards ──────────────────────────────────────────── */
.card{
  background:#fff;border-radius:var(--radius);
  box-shadow:var(--shadow-card);border:1.5px solid #f3f4f6;
}
.card-header{
  padding:16px 20px;border-bottom:1px solid #f3f4f6;
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{font-weight:800;font-size:15px;color:#1e1b4b;display:flex;align-items:center;gap:10px}
.card-title .icon{
  width:32px;height:32px;border-radius:9px;background:var(--purple-100);
  display:flex;align-items:center;justify-content:center;color:#7c3aed;font-size:14px;
}
.card-body{padding:20px}

/* ── Buttons ────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:10px 18px;
  border-radius:10px;border:none;cursor:pointer;font-family:inherit;
  font-weight:700;font-size:13.5px;transition:all .2s;text-decoration:none;
}
.btn-primary{background:var(--grad-btn);color:#fff;box-shadow:var(--shadow-btn)}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:#f5f3ff;color:#7c3aed;border:1.5px solid #ede9fe}
.btn-secondary:hover{background:#ede9fe}
.btn-danger{background:#fef2f2;color:#ef4444;border:1.5px solid #fee2e2}
.btn-danger:hover{background:#fee2e2}
.btn-success{background:#f0fdf4;color:#22c55e;border:1.5px solid #dcfce7}
.btn-success:hover{background:#dcfce7}
.btn-warning{background:#fffbeb;color:#f59e0b;border:1.5px solid #fef3c7}
.btn-warning:hover{background:#fef3c7}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px}
.btn-xs{padding:5px 10px;font-size:11px;border-radius:7px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}

/* ── Badges ─────────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:99px;font-size:11px;font-weight:700;
}
.badge-novo{background:#eff6ff;color:#2563eb}
.badge-preparando{background:#fff7ed;color:#ea580c}
.badge-em_montagem{background:#fdf4ff;color:#9333ea}
.badge-a_caminho{background:#fef9c3;color:#854d0e}
.badge-pronto{background:#f0fdf4;color:#16a34a}
.badge-entregue{background:#f0fdf4;color:#16a34a}
.badge-cancelado{background:#fef2f2;color:#dc2626}
.badge-online{background:#eff6ff;color:#2563eb}
.badge-balcao{background:#f5f3ff;color:#7c3aed}
.badge-delivery{background:#fff7ed;color:#ea580c}

/* ── Form ───────────────────────────────────────────── */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase}
.form-control{
  width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:10px;
  font-family:inherit;font-size:13.5px;color:#1e1b4b;background:#fff;
  transition:border-color .2s,box-shadow .2s;outline:none;
}
.form-control:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.form-control:disabled{background:#f9fafb;color:#9ca3af}
select.form-control{cursor:pointer}
.form-row{display:grid;gap:16px}
.form-row.cols-2{grid-template-columns:1fr 1fr}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr}

/* ── Modal ──────────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,5,40,.65);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:16px;
  opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px);
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{
  background:#fff;border-radius:20px;width:100%;max-width:580px;
  max-height:90vh;overflow-y:auto;
  transform:translateY(24px) scale(.97);transition:transform .25s;
}
.modal-overlay.open .modal-box{transform:translateY(0) scale(1)}
.modal-box.modal-lg{max-width:780px}
.modal-box.modal-xl{max-width:960px}
.modal-header{
  padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #f3f4f6;position:sticky;top:0;background:#fff;z-index:2;border-radius:20px 20px 0 0;
}
.modal-title{font-weight:800;font-size:17px;color:#1e1b4b;display:flex;align-items:center;gap:10px}
.modal-close{
  width:32px;height:32px;border-radius:8px;border:1.5px solid #e5e7eb;
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#6b7280;font-size:16px;transition:all .2s;
}
.modal-close:hover{background:#fef2f2;border-color:#fecaca;color:#ef4444}
.modal-body{padding:24px}
.modal-footer{
  padding:16px 24px;border-top:1px solid #f3f4f6;
  display:flex;gap:12px;justify-content:flex-end;
}

/* ── Stat Cards ─────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{
  background:#fff;border-radius:var(--radius);padding:20px;
  border:1.5px solid #f3f4f6;box-shadow:var(--shadow-card);
}
.stat-card .stat-label{font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
.stat-card .stat-value{font-size:28px;font-weight:900;color:#1e1b4b;margin-top:4px;line-height:1}
.stat-card .stat-sub{font-size:12px;color:#9ca3af;margin-top:4px}
.stat-card .stat-icon{
  width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;margin-bottom:12px;
}
.stat-purple .stat-icon{background:#f5f3ff;color:#7c3aed}
.stat-green  .stat-icon{background:#f0fdf4;color:#22c55e}
.stat-orange .stat-icon{background:#fff7ed;color:#f97316}
.stat-blue   .stat-icon{background:#eff6ff;color:#3b82f6}
.stat-pink   .stat-icon{background:#fdf2f8;color:#ec4899}

/* ── Tabela ─────────────────────────────────────────── */
.table-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse}
table.tbl th{
  background:#f9fafb;padding:10px 14px;text-align:left;
  font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;
  letter-spacing:.5px;border-bottom:1px solid #f3f4f6;white-space:nowrap;
}
table.tbl td{
  padding:13px 14px;border-bottom:1px solid #f9fafb;
  font-size:13.5px;color:#374151;vertical-align:middle;
}
table.tbl tr:hover td{background:#faf9ff}
table.tbl tr:last-child td{border-bottom:none}

/* ── PDV ─────────────────────────────────────────────── */
.pdv-grid{display:grid;grid-template-columns:1fr 360px;gap:20px;height:calc(100vh - 160px)}
.pdv-left{overflow-y:auto}
.pdv-right{overflow-y:auto}

/* ── Caixa ──────────────────────────────────────────── */
.caixa-itens{list-style:none;margin:0;padding:0}
.caixa-itens li{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid #f3f4f6;gap:8px;
}
.caixa-itens li:last-child{border-bottom:none}
.caixa-item-nome{flex:1;font-size:13px;font-weight:600;color:#374151}
.caixa-item-preco{font-size:13.5px;font-weight:800;color:#7c3aed;white-space:nowrap}
.caixa-item-rem{
  width:24px;height:24px;border-radius:6px;border:none;background:#fef2f2;
  color:#ef4444;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:background .2s;flex-shrink:0;
}
.caixa-item-rem:hover{background:#fee2e2}
.caixa-total{
  background:linear-gradient(135deg,#f5f3ff,#ede9fe);
  border-radius:12px;padding:14px 16px;margin-top:12px;
}
.caixa-total-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;color:#374151}
.caixa-total-row.big{font-size:17px;font-weight:900;color:#1e1b4b;margin-top:8px;padding-top:8px;border-top:1.5px solid #ddd6fe}
.caixa-troco{
  background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;
  padding:10px 14px;margin-top:10px;text-align:center;
  font-weight:800;color:#16a34a;font-size:16px;
}

/* ── Pedido Card ────────────────────────────────────── */
.pedido-card{
  background:#fff;border-radius:14px;border:1.5px solid #f3f4f6;
  padding:14px 16px;margin-bottom:12px;transition:all .2s;
}
.pedido-card:hover{border-color:#ddd6fe;box-shadow:0 4px 20px rgba(109,40,217,.08)}
.pedido-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.pedido-card-id{font-size:11px;font-weight:700;color:#9ca3af}
.pedido-card-cliente{font-weight:800;font-size:14px;color:#1e1b4b;margin-top:2px}
.pedido-card-hora{font-size:11px;color:#9ca3af}
.pedido-card-body{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pedido-card-footer{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.pedido-card-total{font-size:16px;font-weight:900;color:#7c3aed}

/* ── Delivery Card ──────────────────────────────────── */
.delivery-card{
  background:#fff;border-radius:14px;border:1.5px solid #f3f4f6;
  padding:16px 18px;margin-bottom:12px;transition:all .2s;
}
.delivery-card:hover{border-color:#fed7aa;box-shadow:0 4px 20px rgba(249,115,22,.08)}
.delivery-card.picked{border-color:#bbf7d0}
.entregador-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:#f0fdf4;border:1px solid #bbf7d0;border-radius:99px;
  padding:4px 10px;font-size:11px;font-weight:700;color:#16a34a;
}

/* ── Status steps ───────────────────────────────────── */
.status-steps{display:flex;gap:8px;flex-wrap:wrap}
.status-step-btn{
  flex:1;min-width:90px;padding:8px 12px;border-radius:9px;border:1.5px solid #e5e7eb;
  background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;
  color:#6b7280;transition:all .2s;text-align:center;
}
.status-step-btn.active{background:#7c3aed;border-color:#7c3aed;color:#fff}
.status-step-btn:hover:not(.active){border-color:#c4b5fd;color:#7c3aed;background:#f5f3ff}

/* ── Filtros Relatório ──────────────────────────────── */
.filter-bar{
  background:#fff;border-radius:var(--radius);padding:18px 20px;
  border:1.5px solid #ede9fe;margin-bottom:20px;
}
.filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;align-items:end}

/* ── Spinner ────────────────────────────────────────── */
.spinner{
  width:32px;height:32px;border:3px solid #ede9fe;border-top-color:#7c3aed;
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Loading overlay ────────────────────────────────── */
#loadingOverlay{
  position:fixed;inset:0;background:#f0eeff;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
#loadingOverlay .ldr-logo{font-size:48px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
#loadingOverlay p{font-weight:700;color:#7c3aed;font-size:16px}

/* ── Toast ──────────────────────────────────────────── */
#toastContainer{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{
  background:#1e1b4b;color:#fff;padding:12px 18px;border-radius:12px;
  font-size:13px;font-weight:600;max-width:320px;
  animation:slideIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.25);
  display:flex;align-items:center;gap:10px;
}
.toast.success{background:#064e3b}
.toast.error  {background:#7f1d1d}
.toast.warn   {background:#78350f}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}

/* ── Pesquisa ───────────────────────────────────────── */
.search-bar{position:relative}
.search-bar input{padding-left:38px}
.search-bar i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#9ca3af;font-size:14px}

/* ── Auth Supervisor modal ──────────────────────────── */
.auth-panel{
  background:#fff7ed;border:1.5px solid #fed7aa;border-radius:14px;padding:18px 20px;
}

/* ── Responsivo ─────────────────────────────────────── */
@media(max-width:900px){
  #sidebar{width:72px;min-width:72px}
  #sidebar .logo-text,#sidebar .user-info,#sidebar .nav-label{opacity:0;width:0}
  .pdv-grid{grid-template-columns:1fr;height:auto}
  .form-row.cols-3{grid-template-columns:1fr 1fr}
  .form-row.cols-2{grid-template-columns:1fr}
  .page-content{padding:16px}
}
@media(max-width:600px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .filter-grid{grid-template-columns:1fr 1fr}
  .top-bar{padding:14px 16px}
}
.hidden{display:none!important}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}

// ═══ CONFIGURAÇÃO DA API ════════════════════════════════════════════════════
// Altere API_URL para a URL real do seu backend no Render após o deploy.
var API_URL = 'https://alyxsoftwares-acaiteria.onrender.com'; // ← URL do seu backend no Render

// ─── ID da loja lido da sessão (salvo pelo login.html) ─────────────────────
var LOJA_ID = (function(){
  try{ var s=JSON.parse(sessionStorage.getItem('pdacai_user')||'{}'); return s.loja_id||''; }catch(e){ return ''; }
})();

/** Monta o path multitenant: L('/pedidos') → '/api/lojas/{loja_id}/pedidos' */
function L(path){ return '/api/lojas/'+LOJA_ID+path; }

/**
 * Wrapper fetch — comunicação com a API do backend.
 * @param {string} method  GET | POST | PATCH | DELETE
 * @param {string} path    ex: '/api/pedidos/dia'
 * @param {Object} [body]  payload JSON (omitido em GET/DELETE por id via path)
 * @returns {Promise<any>}
 */
function api(method, path, body) {
  var sessao = JSON.parse(sessionStorage.getItem('pdacai_user') || '{}');
  var controller = new AbortController();
  var tid = setTimeout(function() { controller.abort(); }, 25000);
  var opts = {
    method:  method,
    headers: {
      'Content-Type':  'application/json',
      'Authorization': sessao.token ? 'Bearer ' + sessao.token : ''
    },
    signal: controller.signal
  };
  if (body !== undefined && method !== 'GET') opts.body = JSON.stringify(body);
  return fetch(API_URL + path, opts)
    .then(function(r) {
      clearTimeout(tid);
      if (r.status === 401) {
        sessionStorage.clear();
        window.location.href = 'login.html'+(LOJA_ID?'?loja='+encodeURIComponent(LOJA_ID):'');
        throw new Error('Sess\u00e3o expirada');
      }
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .catch(function(e) { clearTimeout(tid); throw e; });
}

function esc(s){ var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML; }
function fmtMoeda(v){ return 'R$ '+parseFloat(v||0).toFixed(2).replace('.',','); }
function fmtData(str){ if(!str) return '--'; if(str.indexOf('T')>-1){ var d=new Date(str); if(isNaN(d)) return '--'; return (d.getDate()<10?'0':'')+d.getDate()+'/'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'/'+d.getFullYear(); } return str.split(' ')[0]; }
function fmtHora(str){ if(!str) return '--'; if(str.indexOf('T')>-1){ var d=new Date(str); if(isNaN(d)) return '--'; return (d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes(); } var p=str.split(' '); return p[1]?p[1].substring(0,5):'--'; }
function hojeStr(){
  var d=new Date();
  return ('0'+d.getDate()).slice(-2)+'/'+(('0'+(d.getMonth()+1)).slice(-2))+'/'+d.getFullYear();
}
function hojeISO(){
  var d=new Date();
  return d.getFullYear()+'-'+(('0'+(d.getMonth()+1)).slice(-2))+'-'+(('0'+d.getDate()).slice(-2));
}
function isoParaDDMM(iso){
  if(!iso)return '--';
  var p=iso.split('-');
  return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso;
}
function ddmmParaISO(ddmm){
  if(!ddmm)return '';
  var p=ddmm.split('/');
  return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:'';
}

    'A_CAMINHO':'A Caminho','PRONTO':'Pronto','ENTREGUE':'Entregue','CANCELADO':'Cancelado',
    'AGUARDANDO_PIX':'Aguardando PIX'      // ← ADICIONAR

    '</div>';
}

function carregarDados(){
  loading('Carregando dados...');
  api('GET', L('/dados-painel'))
    .then(function(dados){
      concluirCarregamento(dados);
    })
    .catch(function(err){
      // Se for bloqueio de permissão (403), pede apenas o que o cargo permite ver
      if(err.message && err.message.indexOf('403') > -1) {
         var fallback = {};
         var reqs = [
             // Busca as configurações e a logo na rota pública para não dar erro no Entregador
             api('GET', L('/cardapio')).then(function(d){ 
                 fallback.configuracoes = d.configuracoes || {}; 
                 fallback.itensFixos = Array.isArray(d) ? d : (d.prontos || []);
             }).catch(function(){}),
             api('GET', L('/delivery-ativo')).then(function(d){ fallback.deliveryAtivo = d; }).catch(function(){})
         ];
         // Se for Operador (bloqueado de dados financeiros, mas precisa do PDV)
         if (ST.usuario && ST.usuario.cargo !== 'Entregador') {
             reqs.push(api('GET', L('/pedidos/dia')).then(function(d){ fallback.pedidosDia = d; }).catch(function(){}));
             reqs.push(api('GET', L('/dados-monte-acai')).then(function(d){
                 fallback.acaiModelos = d.acaiModelos; fallback.acaiCategorias = d.acaiCategorias; fallback.acaiIngredientes = d.acaiIngredientes;
             }).catch(function(){}));
         }
         Promise.all(reqs).then(function(){
             concluirCarregamento(fallback);
         }).catch(function(e2){ mostrarErroCarregamento(e2); });
      } else {
         mostrarErroCarregamento(err);
      }
    });
}

// ── Som de novo pedido (Web Audio — sem arquivo externo) ────
// Cria a variável fora da função para reutilizar
var _audioCtx = null;

function tocarSomPedido() {
  try {
    if (!_audioCtx) {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // Navegadores suspendem o áudio se não houver interação prévia
    if (_audioCtx.state === 'suspended') {
      _audioCtx.resume();
    }
    function bip(freq, ini, dur) {
      var o = _audioCtx.createOscillator(), g = _audioCtx.createGain();
      o.connect(g); g.connect(_audioCtx.destination);
      o.frequency.value = freq; o.type = 'sine';
      g.gain.setValueAtTime(0.35, _audioCtx.currentTime + ini);
      g.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + ini + dur);
      o.start(_audioCtx.currentTime + ini); 
      o.stop(_audioCtx.currentTime + ini + dur + 0.05);
    }
    bip(880, 0, 0.12); bip(1100, 0.15, 0.12); bip(880, 0.30, 0.22);
  } catch(e) {}
}

function dispararNotificacaoLocal(titulo, corpo) {
  tocarSomPedido();
  try {
    if (window.Notification && Notification.permission === 'granted') {
      var icone = (ST.dados && ST.dados.configuracoes && ST.dados.configuracoes.URL_Logo) ? ST.dados.configuracoes.URL_Logo : '';
      navigator.serviceWorker.getRegistration().then(function(reg) {
        if (reg) {
          // Vira uma notificação nativa do Android/iOS que acende a tela
          reg.showNotification(titulo, { body: corpo, icon: icone, vibrate: [300, 100, 300, 100, 300] });
        } else {
          new Notification(titulo, { body: corpo, icon: icone });
        }
      });
    }
  } catch(e) {}
}

function iniciarPolling(){
  if(ST.pollingTimer) clearInterval(ST.pollingTimer);
  ST.pollingTimer=setInterval(function(){
    
    // Se for Entregador, busca APENAS o Delivery Ativo para não tomar erro de permissão
    if(ST.usuario && ST.usuario.cargo === 'Entregador') {
       api('GET', L('/delivery-ativo')).then(function(res){
          if(!ST.dados) return;
          ST.dados.deliveryAtivo = res;
          var novos=(res||[]).filter(function(p){ 
              if ((p.Status||'').toString().toUpperCase() !== 'NOVO') return false;
              // Se for Retirada, ignora e não toca o bip no celular do motoboy
              try {
                  var cli = typeof p.Cliente_Info === 'string' ? JSON.parse(p.Cliente_Info) : (p.Cliente_Info||{});
                  if (cli.endereco === 'Retirada na loja') return false;
              } catch(e) {}
              return true;
          }).length;
          
          if(ST._qtdDeliveryAnterior>=0 && novos>ST._qtdDeliveryAnterior) {
              tocarSomPedido(); // Apenas toca o bip (A notificação visual vem do Servidor)
          }
          ST._qtdDeliveryAnterior=novos;
          if(ST.abaAtiva==='abaDelivery') renderDelivery();
       }).catch(function(){});
       return;
    }

    // Para outros cargos (Dono, Gerente, Operador) continua normalmente
    api('GET', L('/polling'))
      .then(function(res){
        if(!ST.dados) return;
        
        var novosDel = (res.deliveryAtivo||[]).filter(function(p){ return (p.Status||'').toString().toUpperCase()==='NOVO'; }).length;
        var novosBal = (res.pedidosDia?.pedidos||[]).filter(function(p){ return (p.Status||'').toString().toUpperCase()==='NOVO' && p.Origem === 'ONLINE'; }).length;
        var totalNovos = novosDel + novosBal;
        
        if(ST._qtdDeliveryAnterior >= 0 && totalNovos > ST._qtdDeliveryAnterior) {
            tocarSomPedido(); // Apenas toca o bip (A notificação visual vem do Servidor)
        }
        ST._qtdDeliveryAnterior = totalNovos;

        ST.dados.pedidosDia    = res.pedidosDia;
        ST.dados.deliveryAtivo = res.deliveryAtivo;
        if(ST.abaAtiva==='abaPedidos')  renderPedidosDia();
        if(ST.abaAtiva==='abaDelivery') renderDelivery();
        if(ST.abaAtiva==='abaRetirada') renderRetirada();
      })
      .catch(function(){});
  }, 8000);
}

function construirUI(){
  var u=ST.usuario;
  var config=(ST.dados&&ST.dados.configuracoes)||{};
  var urlLogo=config['URL_Logo']||'';
  var nomeLoja=config['Nome_Loja']||'Sistema';
  document.title=nomeLoja+' — Painel';

  document.getElementById('sidebarNome').textContent=u.nome||'Usuário';
  document.getElementById('sidebarCargo').textContent=u.cargo||'';
  var avatarEl=document.getElementById('sidebarAvatar');
      
      // Busca a foto atualizada direto da lista de usuários do banco
      var fotoUrl = u.fotoPerfil || '';
      if (ST.dados && ST.dados.usuarios) {
        var userDb = ST.dados.usuarios.find(function(x) { return x.Nome === u.nome; });
        if (userDb && userDb.Foto_Perfil) fotoUrl = userDb.Foto_Perfil;
      }

      if(fotoUrl){
        avatarEl.textContent='';
        avatarEl.innerHTML='<img src="'+esc(fotoUrl)+'" alt="'+esc(u.nome)+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentElement.textContent=\''+((u.nome||'U')[0].toUpperCase())+'\';">';
      } else {
        avatarEl.textContent=(u.nome||'U')[0].toUpperCase();
      }

  // Atualiza logo sidebar
  var logoIcon=document.getElementById('sidebarLogoIcon');
  if(logoIcon&&urlLogo){
    logoIcon.innerHTML='<img src="'+urlLogo+'" alt="Logo" style="width:100%;height:100%;object-fit:cover;border-radius:12px" onerror="this.parentElement.textContent=\'🍇\'">';
    logoIcon.style.background='none';
  }
  var logoText=document.getElementById('sidebarLogoText');
  if(logoText) logoText.innerHTML=esc(nomeLoja)+'<br><span style="font-size:10px;opacity:.6">Painel de Controle</span>';

  // Atualiza logo loading overlay e Favicon da aba de forma otimizada
  var ldrEmoji=document.getElementById('ldrLogoEmoji');
  var ldrImg=document.getElementById('ldrLogoImg');
  if(urlLogo){
    if(ldrEmoji && ldrImg){
      ldrEmoji.style.display='none';
      ldrImg.src=urlLogo;
      ldrImg.style.display='block';
    }
    var link = document.querySelector("link[rel~='icon']");
    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
    link.href = urlLogo;
  }

  // Monta nav
  var nav=document.getElementById('sidebarNav');
  nav.innerHTML='';
  ABAS.forEach(function(aba){
    if(u.permissoes.indexOf(aba.id)===-1) return;
    var a=document.createElement('a');
    a.innerHTML='<i class="fa-solid '+aba.icon+'"></i><span class="nav-label">'+aba.label+'</span>';
    a.onclick=function(){ navegarPara(aba.id); };
    a.dataset.aba=aba.id;
    nav.appendChild(a);
  });

  // Renderiza cada seção
  renderSecaoPedidos();
  renderSecaoDelivery();
  renderSecaoRetirada();
  renderSecaoRelatorios();
  renderSecaoItens();
  renderSecaoMonteAcai();
  renderSecaoConfig();

  // Navega para a primeira aba permitida
  var primeira=u.permissoes[0]||'abaPedidos';
  navegarPara(primeira);

  // Adicione ao final de construirUI(), verificando o cargo:
  // ── Bloqueia DevTools para cargos que não são Dono ──────────────────────
  (function() {
    if (u.cargo === 'Dono') return;
    document.addEventListener('keydown', function(ev) {
      var isF12       = ev.key === 'F12';
      var isCtrlShift = ev.ctrlKey && ev.shiftKey && ['I','J','C'].includes(ev.key.toUpperCase());
      var isCtrlU     = ev.ctrlKey && ev.key.toUpperCase() === 'U';
      if (isF12 || isCtrlShift || isCtrlU) {
        ev.preventDefault();
        ev.stopImmediatePropagation();
      }
    }, true);
    document.addEventListener('contextmenu', function(ev) {
      ev.preventDefault();
    });
  })();

  if(u.cargo==='Entregador'){
  toast('🔔 Clique em qualquer lugar para ativar notificações sonoras','');
}
}

function navegarPara(id){
  ST.abaAtiva=id;
  document.querySelectorAll('.aba-section').forEach(function(el){ el.classList.add('hidden'); });
  document.querySelectorAll('#sidebarNav a').forEach(function(a){
    a.classList.toggle('active', a.dataset.aba===id);
  });
  var sec=document.getElementById(id);
  if(sec) sec.classList.remove('hidden');

  // Ações ao entrar na aba
  if(id==='abaPedidos')    { renderPedidosDia(); }
  if(id==='abaDelivery')   { renderDelivery(); }
  if(id==='abaRetirada')   { renderRetirada(); }
  if(id==='abaRelatorios') { carregarRelatorio(); }
  if(id==='abaConfig')     { renderSecaoConfig(); }
}

function topBar(titulo, subtitulo, btnsHTML){
  return '<div class="top-bar"><div><h1>'+esc(titulo)+'</h1><p>'+esc(subtitulo)+'</p></div>'+
         '<div class="top-bar-actions">'+(btnsHTML||'')+'<button class="btn-refresh" onclick="refreshAbaAtual()" title="Atualizar dados do servidor"><i class="fa-solid fa-rotate-right"></i></button></div></div>';
}

function refreshAbaAtual(){
  if(ST.abaAtiva==='abaPedidos')          recarregarPedidosDia();
  else if(ST.abaAtiva==='abaDelivery')    recarregarDelivery();
  else if(ST.abaAtiva==='abaRetirada')    recarregarRetirada();
  else if(ST.abaAtiva==='abaRelatorios')  carregarRelatorio();
  else if(ST.abaAtiva==='abaMonteAcai')   recarregarMonteAcai();
  else if(ST.abaAtiva==='abaItens')       recarregarItens();
  else if(ST.abaAtiva==='abaConfig')      recarregarConfig();
  else navegarPara(ST.abaAtiva);
}

function recarregarConfig(){

      renderSecaoConfig();
    })
    .catch(function(){
      toast('Erro ao recarregar configurações','error');
    });
}

function renderPedidosDia(){
  if(!ST.dados) return;
  var res=ST.dados.pedidosDia||{pedidos:[],resumo:{}};
  var pedidos=(res.pedidos||[]).slice().sort(function(a,b){
    // Converte dd/MM/yyyy HH:mm:ss → yyyy/MM/dd HH:mm:ss para sort correto
    function _sortKey(s){ var p=s?s.split(' '):[''];var d=p[0].split('/'); return (d[2]||'')+'/'+(d[1]||'')+'/'+(d[0]||'')+' '+(p[1]||''); }
    return _sortKey(b.Data_Hora||'').localeCompare(_sortKey(a.Data_Hora||''));
  });
  var resumo=res.resumo||{};

  // Contador
  var cont=document.getElementById('contadorPedidosDia');
  if(cont) cont.textContent=pedidos.length;

  // Resumo
  var rdiv=document.getElementById('resumoDia');
  if(rdiv){
    var emAberto=pedidos.filter(function(p){ return ['ENTREGUE','CANCELADO'].indexOf((p.Status||'').toUpperCase())===-1; }).length;
    rdiv.innerHTML=
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
        resCard('fa-money-bill-wave','Total','stat-green',fmtMoeda(resumo.totalVendas||0))+
        resCard('fa-receipt','Pedidos','stat-purple',(resumo.qtdPedidos||0)+' total')+
        resCard('fa-tag','Descontos','stat-orange',fmtMoeda(resumo.totalDescontos||0))+
        resCard('fa-clock','Em Aberto','stat-blue',emAberto+' pedido'+(emAberto!==1?'s':''))+
      '</div>'+
      '<div class="mt-3" style="font-size:12px;color:#6b7280">'+
        '<div class="flex justify-between mb-2"><span>Balcão</span><strong>'+(resumo.porOrigem&&resumo.porOrigem.BALCAO||0)+'</strong></div>'+
        '<div class="flex justify-between mb-2"><span>Delivery</span><strong>'+(resumo.porOrigem&&resumo.porOrigem.DELIVERY||0)+'</strong></div>'+
        '<div class="flex justify-between"><span>Online</span><strong>'+(resumo.porOrigem&&resumo.porOrigem.ONLINE||0)+'</strong></div>'+
      '</div>';
  }

  // Lista principal (balcão + delivery)
  var lista=document.getElementById('listaPedidosDia');
  if(lista){
    var pdvs=pedidos.filter(function(p){ var o=(p.Origem||'').toUpperCase(); return o==='BALCAO'||o==='DELIVERY'; });
    lista.innerHTML=pdvs.length?pdvs.map(renderPedidoCard).join(''):'<div class="empty-state"><i class="fa-solid fa-mug-hot"></i><p>Nenhum pedido no balcão/delivery</p></div>';
  }

  // Lista online
  var onl=document.getElementById('listaOnline');
  if(onl){
    var online=pedidos.filter(function(p){ return (p.Origem||'').toUpperCase()==='ONLINE'; });
    onl.innerHTML=online.length?online.map(renderPedidoCard).join(''):'<div class="empty-state"><i class="fa-solid fa-globe"></i><p>Nenhum pedido online</p></div>';
  }
}

    '<div style="font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:4px">'+
    '<i class="fa-solid '+icon+'" style="margin-right:4px"></i>'+label+'</div>'+
    '<div style="font-size:16px;font-weight:900;color:#1e1b4b">'+val+'</div>'+
  '</div>';
}

function renderPedidoCard(p){
  var cli=parseCliente(p.Cliente_Info);
  var nomeCliente=cli.nome||'Cliente';
  var st=(p.Status||'').toUpperCase();
  var origemDoCancelavel=['DELIVERY','ONLINE','BALCAO'].indexOf((p.Origem||'').toUpperCase())>-1;
  var eBalcao=(p.Origem||'').toUpperCase()==='BALCAO';
  // Balcão nasce ENTREGUE — permite cancelar mesmo assim; Delivery/Online não cancela se já entregue
  var podeCancelar=origemDoCancelavel&&st!=='CANCELADO'&&(eBalcao||st!=='ENTREGUE');
  var canceladoPor=p.Cancelado_Por?'<div class="text-xs text-red mt-2"><i class="fa-solid fa-circle-exclamation"></i> Cancelado por: '+esc(p.Cancelado_Por)+'</div>':'';

  return '<div class="pedido-card">'+
    '<div class="pedido-card-header">'+
      '<div>'+
        '<div class="pedido-card-id">'+esc(p.ID_Venda)+'</div>'+
        '<div class="pedido-card-cliente">'+esc(nomeCliente)+'</div>'+
        '<div class="pedido-card-hora"><i class="fa-regular fa-clock"></i> '+esc(fmtHora(p.Data_Hora))+'</div>'+
      '</div>'+
      '<div style="text-align:right">'+badgeStatus(p.Status)+'<br><div class="mt-2">'+badgeOrigem(p.Origem)+'</div></div>'+
    '</div>'+
    '<div class="pedido-card-body">'+
      '<span class="pedido-card-total">'+fmtMoeda(p.Total_Final)+'</span>'+
      (p.Metodo_Pagamento?'<span class="badge" style="background:#f3f4f6;color:#374151"><i class="fa-solid fa-credit-card"></i>'+esc(p.Metodo_Pagamento)+'</span>':'')+
    '</div>'+
    canceladoPor+
    '<div class="pedido-card-footer">'+
      '<button class="btn btn-sm btn-secondary" onclick="verDetalhesPedido(\''+esc(p.ID_Venda)+'\')"><i class="fa-solid fa-eye"></i>Detalhes</button>'+
      '<button class="btn btn-sm btn-secondary" onclick="imprimirCupomBusca(\''+esc(p.ID_Venda)+'\')" title="Imprimir Cupom"><i class="fa-solid fa-print"></i></button>'+
      (podeCancelar?'<button class="btn btn-sm btn-danger" onclick="pedirCancelamento(\''+esc(p.ID_Venda)+'\')"><i class="fa-solid fa-ban"></i>Cancelar</button>':'')+
    '</div>'+
  '</div>';
}

function buscarPedidosUI(){
  var q=document.getElementById('inputBusca').value.trim();
  var div=document.getElementById('resultadoBusca');
  if(!q){ div.innerHTML=''; return; }
  if(q.length<3) return;
  // Debounce: aguarda 600ms sem digitar antes de buscar
  if(ST._buscaTimer) clearTimeout(ST._buscaTimer);
  div.innerHTML='<div class="flex items-center gap-2 text-muted text-sm"><div class="spinner" style="width:20px;height:20px;border-width:2px"></div>Aguardando...</div>';
  ST._buscaTimer=setTimeout(function(){
    div.innerHTML='<div class="flex items-center gap-2 text-muted text-sm"><div class="spinner" style="width:20px;height:20px;border-width:2px"></div>Buscando...</div>';
    api('GET', L('/pedidos/buscar?q=') + encodeURIComponent(q))
      .then(function(res){
        if(!res||res.length===0){ div.innerHTML='<p class="text-sm text-muted">Nenhum resultado encontrado.</p>'; return; }
        div.innerHTML='<p class="text-xs text-muted mb-2">'+res.length+' resultado(s)</p>'+res.map(renderPedidoCard).join('');
      })
      .catch(function(){ div.innerHTML='<p class="text-sm text-red">Erro na busca.</p>'; });
  }, 600);
}

// Cancelamento
function pedirCancelamento(idVenda){
  ST.cancelTarget=idVenda;
  document.getElementById('cancelPedidoId').textContent=idVenda;
  document.getElementById('authCancelLogin').value='';
  document.getElementById('authCancelSenha').value='';
  document.getElementById('authCancelMsg').innerHTML='';
  abrirModal('modalAuthCancel');
}

function confirmarCancelamento(){
  var login=document.getElementById('authCancelLogin').value.trim();
  var senha=document.getElementById('authCancelSenha').value;
  var msgEl=document.getElementById('authCancelMsg');
  var btn=document.getElementById('btnConfirmarCancel');
  if(!login||!senha){ msgEl.innerHTML='<p class="text-sm text-red"><i class="fa-solid fa-circle-exclamation"></i> Preencha login e senha.</p>'; return; }
  btn.disabled=true; btn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px"></div> Verificando...';
  api('POST', L('/pedidos/') + ST.cancelTarget + '/cancelar', { login: login, senha: senha })
    .then(function(res){
      btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-ban"></i>Cancelar Pedido';
      if(res.sucesso){
        fecharModal('modalAuthCancel');
        toast(res.mensagem,'success');
        navegarPara('abaPedidos');
      } else {
        msgEl.innerHTML='<p class="text-sm text-red"><i class="fa-solid fa-circle-xmark"></i> '+esc(res.mensagem)+'</p>';
      }
    })
    .catch(function(e){
      btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-ban"></i>Cancelar Pedido';
      msgEl.innerHTML='<p class="text-sm text-red">Erro: '+esc(e)+'</p>';
    });
}

// Detalhes do pedido
function verDetalhesPedido(id){
  if(!ST.dados) return;
  var todos=(ST.dados.pedidosDia&&ST.dados.pedidosDia.pedidos)||[];
  var p=todos.find(function(x){ return x.ID_Venda===id; });
  // Se não encontrou em pedidosDia, procura em deliveryAtivo
  if(!p){
    var delivery=ST.dados.deliveryAtivo||[];
    p=delivery.find(function(x){ return x.ID_Venda===id; });
  }
  // Se ainda não encontrou, procura nos relatórios carregados na tela
  if(!p && window._relatorioAtual){
    p = window._relatorioAtual.find(function(x){ return x.ID_Venda===id; });
  }
  if(!p){ toast('Pedido não encontrado na listagem atual.','warn'); return; }
  var cli=parseCliente(p.Cliente_Info);
  var itens=parseItens(p.Itens_Comprados);

  var itensHTML=itens.map(function(it){
    return '<div class="flex justify-between items-center" style="padding:8px 0;border-bottom:1px solid #f3f4f6">'+
      '<div><div style="font-weight:600;font-size:13px">'+esc(it.descricao||it.nome||'Item')+'</div>'+
      (it.detalhes?'<div style="font-size:11px;color:#9ca3af">'+esc(it.detalhes)+'</div>':'')+
      '</div><div style="font-weight:800;color:#7c3aed">'+fmtMoeda(it.preco)+'</div></div>';
  }).join('');

  document.getElementById('modalFormTitle').innerHTML='<i class="fa-solid fa-receipt"></i> '+esc(p.ID_Venda);
  document.getElementById('modalFormBody').innerHTML=
    '<div class="flex gap-3 mb-4 flex-wrap">'+badgeStatus(p.Status)+badgeOrigem(p.Origem)+'</div>'+
    '<div class="grid-2 mb-4">'+
      infoBox('Cliente',cli.nome||'--')+
      infoBox('Telefone',cli.telefone||'--')+
      infoBox('Data',fmtData(p.Data_Hora))+
      infoBox('Hora',fmtHora(p.Data_Hora))+
      infoBox('Pagamento',p.Metodo_Pagamento||'--')+
      infoBox('Operador',p.Operador||'--')+

    '<i class="fa-solid '+icon+'" style="display:block;font-size:18px;margin-bottom:4px"></i>'+label+sc+'</button>';

function selecionarPgto(grupo,val){
  // Salva no estado (resolve bug de múltiplos cliques)
  ST.pgtoAtivo[grupo]=val;

  // Reseta visual de todos os botões do grupo
  document.querySelectorAll('[id^="pg_'+grupo+'_"]').forEach(function(el){
    el.style.background='#fff'; el.style.borderColor='#e5e7eb'; el.style.color='#374151';
  });
  var btn=document.getElementById('pg_'+grupo+'_'+val);
  if(btn){ btn.style.background='#7c3aed'; btn.style.borderColor='#7c3aed'; btn.style.color='#fff'; }

  // Mostra/esconde campo de troco apenas para o modal correto
  if(grupo==='b_pgto'){
    var tgB=document.getElementById('b_trocoGroup');
    if(tgB) tgB.style.display=(val==='DINHEIRO')?'block':'none';
    if(document.getElementById('b_pesoBruto')) calcBalcao();
  } else if(grupo==='d_pgto'){
    var tgD=document.getElementById('d_trocoGroup');
    if(tgD) tgD.style.display=(val==='DINHEIRO')?'block':'none';
    if(document.getElementById('d_taxa')) calcDelivery();
  }
}

function selecionarTara(){
  var sel=document.getElementById('b_tara');
  var opt=sel.options[sel.selectedIndex];
  var peso=opt.dataset.peso||0;
  document.getElementById('b_pesoTara').value=peso;
  calcBalcao();
}

function calcBalcao(){
  var bruto=parseFloat(document.getElementById('b_pesoBruto').value||0);
  var tara =parseFloat(document.getElementById('b_pesoTara').value||0);
  var kgP  =parseFloat(document.getElementById('b_precoKG').value||0);
  var liq  =Math.max(0,bruto-tara);
  var vAcai=Math.round((liq/1000)*kgP*100)/100;
  var somaAcaiCartTmp=ST.pdvAcaiItens.reduce(function(s,i){ return s+i.preco; },0);
  var extrasTmp=ST.pdvBalcaoItens.reduce(function(s,i){ return s+i.preco; },0);
  var subtotalTmp=vAcai+somaAcaiCartTmp+extrasTmp;
  // Cupom PERCENTUAL: recalcula desconto em R$ sobre subtotal atual
  if(ST._cupomAtivo&&ST._cupomAtivo.tipo==='PERCENTUAL'&&ST._cupomAtivo.hiddenId==='b_desconto'){
    var descPct=Math.round(subtotalTmp*(ST._cupomAtivo.valor/100)*100)/100;
    document.getElementById('b_desconto').value=descPct;
  }
  var desc =parseFloat(document.getElementById('b_desconto').value||0);
  // Soma açaís já adicionados ao carrinho
  var somaAcaiCart=ST.pdvAcaiItens.reduce(function(s,i){ return s+i.preco; },0);
  var extras=ST.pdvBalcaoItens.reduce(function(s,i){ return s+i.preco; },0);
  var subtotal=vAcai+somaAcaiCart+extras;
  var total=Math.max(0,subtotal-desc);
  var valorPago=parseFloat((document.getElementById('b_valorPago')||{}).value||0);
  var troco=Math.max(0,valorPago-total);

  document.getElementById('b_pesoLiqVal').textContent=liq+'g';
  document.getElementById('b_valorAcaiVal').textContent=fmtMoeda(vAcai);
  document.getElementById('b_r_acai').textContent=fmtMoeda(vAcai);
  // Açaís no carrinho
  var acaiExtraEl=document.getElementById('b_r_acai_extra');
  if(acaiExtraEl) acaiExtraEl.textContent=fmtMoeda(somaAcaiCart);
  document.getElementById('b_r_extras').textContent=fmtMoeda(extras);
  document.getElementById('b_r_desc').textContent='-'+fmtMoeda(desc);
  document.getElementById('b_r_total').textContent=fmtMoeda(total);

  var tBox=document.getElementById('b_trocoDisplay');
  if(tBox){
    if(valorPago>0&&troco>=0){tBox.classList.remove('hidden');document.getElementById('b_trocoVal').textContent=fmtMoeda(troco);}
    else tBox.classList.add('hidden');
  }
}

function adicionarItemBalcao(){
  var sel=document.getElementById('b_itemSelect');
  var opt=sel.options[sel.selectedIndex];
  if(!opt.value) return;
  var item={id:opt.value,descricao:opt.dataset.nome,preco:parseFloat(opt.dataset.preco)||0};
  ST.pdvBalcaoItens.push(item);
  sel.selectedIndex=0;
  renderListaBalcao();
  calcBalcao();
}

function removerItemBalcao(idx){
  ST.pdvBalcaoItens.splice(idx,1);
  renderListaBalcao(); calcBalcao();
}

function renderListaBalcao(){
  var ul=document.getElementById('b_listaItens');
  if(!ul) return;
  ul.innerHTML=ST.pdvBalcaoItens.map(function(item,i){
    return '<li><span class="caixa-item-nome">'+esc(item.descricao)+'</span>'+
      '<span class="caixa-item-preco">'+fmtMoeda(item.preco)+'</span>'+
      '<button class="caixa-item-rem" onclick="removerItemBalcao('+i+')"><i class="fa-solid fa-xmark"></i></button></li>';
  }).join('');

// ─── Multi-açaí: adicionar pesagem ao carrinho ───────────────
function adicionarAcaiBalcao(){
  var bruto=parseFloat(document.getElementById('b_pesoBruto').value||0);
  var tara =parseFloat(document.getElementById('b_pesoTara').value||0);
  var kgP  =parseFloat(document.getElementById('b_precoKG').value||0);

  if(bruto<=0){
    toast('Informe o peso bruto antes de adicionar.','warn');
    return;
  }

  var liq  =Math.max(0,bruto-tara);
  var preco=Math.round((liq/1000)*kgP*100)/100;

  ST.pdvAcaiItens.push({
    tipo:'acai_balanca',
    descricao:'Açaí — '+liq+'g',
    detalhes:bruto+'g bruto − '+tara+'g tara',
    preco:preco,
    pesoBruto:bruto, pesoTara:tara, pesoLiq:liq
  });

  // Limpa os campos de peso para a próxima pesagem
  document.getElementById('b_pesoBruto').value='';
  document.getElementById('b_pesoTara').value='0';
  document.getElementById('b_tara').selectedIndex=0;
  document.getElementById('b_pesoLiqVal').textContent='0 g';
  document.getElementById('b_valorAcaiVal').textContent='R$ 0,00';

  renderListaAcaiBalcao();
  calcBalcao();
  toast('Açaí de '+liq+'g adicionado ao carrinho!','success');
}

// ─── Açaí rápido: adicionar modelo de preço fixo ao carrinho ───────────
function adicionarModeloBalcao(id,nome,preco){
  ST.pdvAcaiItens.push({
    tipo:'acai_modelo',
    descricao:nome,
    detalhes:'Preço fixo',
    preco:preco,
    idModelo:id
  });
  renderListaAcaiBalcao();
  calcBalcao();
  toast(nome+' adicionado!','success');
}

function removerAcaiBalcao(idx){
  ST.pdvAcaiItens.splice(idx,1);

}

function renderListaAcaiBalcao(){
  var ul=document.getElementById('b_listaAcai');
  var wrap=document.getElementById('b_listaAcaiWrap');
  if(!ul) return;
  if(!ST.pdvAcaiItens.length){
    if(wrap) wrap.style.display='none';
    ul.innerHTML='';
    return;
  }
  if(wrap) wrap.style.display='block';
  ul.innerHTML=ST.pdvAcaiItens.map(function(item,i){
    return '<li style="background:#f0fdf4;border-radius:8px;padding:8px 10px;margin-bottom:4px">'+

        '<span class="caixa-item-nome" style="color:#166534"><i class="fa-solid fa-ice-cream"></i> '+esc(item.descricao)+'</span>'+
        '<div style="font-size:11px;color:#6b7280">'+esc(item.detalhes)+'</div>'+
      '</div>'+
      '<span class="caixa-item-preco" style="color:#16a34a">'+fmtMoeda(item.preco)+'</span>'+
      '<button class="caixa-item-rem" onclick="removerAcaiBalcao('+i+')"><i class="fa-solid fa-xmark"></i></button>'+
    '</li>';
  }).join('');

function getPgtoSelecionado(grupo){
  return ST.pgtoAtivo[grupo]||'';
}

function finalizarBalcao(){
  // Guard anti-duplo-clique
  if(ST.registrando) return;

  var bruto=parseFloat(document.getElementById('b_pesoBruto').value||0);
  var tara =parseFloat(document.getElementById('b_pesoTara').value||0);
  var kgP  =parseFloat(document.getElementById('b_precoKG').value||0);
  var pgto =getPgtoSelecionado('b_pgto');
  var msg  =document.getElementById('b_finMsg');

  // Aceita: peso atual > 0 OU itens de açaí no carrinho
  var temAcaiCarrinho=ST.pdvAcaiItens.length>0;
  if(bruto<=0&&!temAcaiCarrinho&&!ST.pdvBalcaoItens.length){
    msg.innerHTML='<p class="text-sm text-red"><i class="fa-solid fa-exclamation-circle"></i> Pese um açaí ou adicione itens ao carrinho.</p>'; return;
  }
  if(!pgto){ msg.innerHTML='<p class="text-sm text-red"><i class="fa-solid fa-exclamation-circle"></i> Selecione a forma de pagamento.</p>'; return; }

  var taraEl=document.getElementById('b_tara');
  var idTara=taraEl.value||'';
  var btn=document.getElementById('b_btnFinalizar');
  ST.registrando=true;
  btn.disabled=true; btn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px"></div> Registrando...';

  // Combina açaís do carrinho + itens extras para enviar ao backend
  var todosItensExtras=
    ST.pdvAcaiItens.map(function(i){ return {tipo:i.tipo,descricao:i.descricao,detalhes:i.detalhes,preco:i.preco}; })
    .concat(ST.pdvBalcaoItens.map(function(i){ return {descricao:i.descricao,preco:i.preco}; }));

  var dados={
    operador:   ST.usuario.nome,
    pesoBruto_g:bruto, idTara:idTara, pesoTara_g:tara, precoKG:kgP,
    itensExtras:todosItensExtras,
    desconto:   parseFloat(document.getElementById('b_desconto').value||0),
    pagamento:  pgto,
    valorPago:  parseFloat((document.getElementById('b_valorPago')||{}).value||0),

        var dd=agora.getDate()<10?'0'+agora.getDate():agora.getDate();
        var mm=agora.getMonth()<9?'0'+(agora.getMonth()+1):(agora.getMonth()+1);
        var hh=agora.getHours()<10?'0'+agora.getHours():agora.getHours();
        var min=agora.getMinutes()<10?'0'+agora.getMinutes():agora.getMinutes();
        var ss=agora.getSeconds()<10?'0'+agora.getSeconds():agora.getSeconds();
        var dataHoraLocal=dd+'/'+mm+'/'+agora.getFullYear()+' '+hh+':'+min+':'+ss;
        var novoItem={
          ID_Venda: res.id||'(novo)',
          Origem:'BALCAO', Data_Hora:dataHoraLocal,
          Operador:ST.usuario.nome,
          Cliente_Info:JSON.stringify({nome:dados.nomeCliente||'',telefone:dados.telefone||''}),
          Itens_Comprados:'[]',
          Total_Final:res.total||0,
          Metodo_Pagamento:dados.pagamento||'',
          Status:'ENTREGUE', Desconto:dados.desconto||0,
          Taxa_Entrega:0, Subtotal:res.total||0, Cancelado_Por:''
        };
        if(!ST.dados) ST.dados={};
        if(!ST.dados.pedidosDia) ST.dados.pedidosDia={pedidos:[],resumo:{}};
        if(!ST.dados.pedidosDia.pedidos) ST.dados.pedidosDia.pedidos=[];
        ST.dados.pedidosDia.pedidos.unshift(novoItem);
        if(ST.abaAtiva!=='abaPedidos') navegarPara('abaPedidos');
        else renderPedidosDia();
        window._ultimoPedidoBalcao = novoItem; // Salva para o botão manual
        if(ST.dados.configuracoes && ST.dados.configuracoes.AutoImprimir_Balcao === 'SIM') {
            imprimirCupom(novoItem);
        }
      } else {
        msg.innerHTML='<p class="text-sm text-red"><i class="fa-solid fa-circle-xmark"></i> '+esc(res.mensagem)+'</p>';
      }
    })
    .catch(function(e){
      ST.registrando=false;
      btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-check-circle"></i>Finalizar Venda no Balcão';
      msg.innerHTML='<p class="text-sm text-red">Erro: '+esc(e)+'</p>';
    });
}

function selecionarBairro(){
  var sel=document.getElementById('d_bairro');
  var opt=sel.options[sel.selectedIndex];
  var taxa=opt.dataset.taxa||0;
  document.getElementById('d_taxa').value=taxa;
  calcDelivery();
}

function adicionarItemDelivery(){
  var sel=document.getElementById('d_itemSelect');
  var opt=sel.options[sel.selectedIndex];
  if(!opt.value) return;
  ST.pdvDeliveryItens.push({id:opt.value,descricao:opt.dataset.nome,preco:parseFloat(opt.dataset.preco)||0});
  sel.selectedIndex=0;
  renderListaDeliveryPDV(); calcDelivery();
}

function removerItemDelivery(idx){
  ST.pdvDeliveryItens.splice(idx,1);
  renderListaDeliveryPDV(); calcDelivery();
}

function renderListaDeliveryPDV(){
  var ul=document.getElementById('d_listaItens');
  if(!ul) return;
  if(!ST.pdvDeliveryItens.length){ ul.innerHTML='<li style="text-align:center;color:#9ca3af;font-size:13px">Nenhum item adicionado</li>'; return; }
  ul.innerHTML=ST.pdvDeliveryItens.map(function(item,i){
    return '<li><span class="caixa-item-nome">'+esc(item.descricao)+'</span>'+
      '<span class="caixa-item-preco">'+fmtMoeda(item.preco)+'</span>'+
      '<button class="caixa-item-rem" onclick="removerItemDelivery('+i+')"><i class="fa-solid fa-xmark"></i></button></li>';
  }).join('');
}

function calcDelivery(){
  var sub=ST.pdvDeliveryItens.reduce(function(s,i){ return s+i.preco; },0);
  // Cupom PERCENTUAL: recalcula desconto em R$ sobre subtotal atual
  if(ST._cupomAtivo&&ST._cupomAtivo.tipo==='PERCENTUAL'&&ST._cupomAtivo.hiddenId==='d_desconto'){
    var descPctD=Math.round(sub*(ST._cupomAtivo.valor/100)*100)/100;
    document.getElementById('d_desconto').value=descPctD;
  }
  var desc=parseFloat((document.getElementById('d_desconto')||{}).value||0);
  var taxa=parseFloat((document.getElementById('d_taxa')||{}).value||0);
  var total=Math.max(0,sub-desc+taxa);
  var valorPago=parseFloat((document.getElementById('d_valorPago')||{}).value||0);
  var troco=Math.max(0,valorPago-total);
  var el=function(id){ return document.getElementById(id); };
  if(el('d_r_sub')) el('d_r_sub').textContent=fmtMoeda(sub);
  if(el('d_r_desc')) el('d_r_desc').textContent='-'+fmtMoeda(desc);
  if(el('d_r_taxa')) el('d_r_taxa').textContent=fmtMoeda(taxa);
  if(el('d_r_total')) el('d_r_total').textContent=fmtMoeda(total);
  var tBox=el('d_trocoDisplay');
  if(tBox){ if(valorPago>0){ tBox.classList.remove('hidden'); el('d_trocoVal').textContent=fmtMoeda(troco); } else tBox.classList.add('hidden'); }
}

    desconto:   parseFloat(document.getElementById('d_desconto').value||0),
    taxaEntrega:parseFloat(document.getElementById('d_taxa').value||0),

    valorPago:  parseFloat((document.getElementById('d_valorPago')||{}).value||0)

  api('POST', L('/pedidos/delivery'), dados)

      ST.registrando=false;

        fecharModal('modalDeliveryPDV');
        toast('Delivery registrado! Total: '+fmtMoeda(res.total),'success');
        // Atualização otimista — sem segunda chamada ao servidor
        var agora=new Date();
        var dd=agora.getDate()<10?'0'+agora.getDate():agora.getDate();
        var mm=agora.getMonth()<9?'0'+(agora.getMonth()+1):(agora.getMonth()+1);
        var hh=agora.getHours()<10?'0'+agora.getHours():agora.getHours();
        var min=agora.getMinutes()<10?'0'+agora.getMinutes():agora.getMinutes();
        var ss=agora.getSeconds()<10?'0'+agora.getSeconds():agora.getSeconds();
        var dataHoraLocal=dd+'/'+mm+'/'+agora.getFullYear()+' '+hh+':'+min+':'+ss;
        var novoItemDel={
          ID_Venda:res.id||'(novo)',
          Origem:'DELIVERY', Data_Hora:dataHoraLocal,
          Operador:ST.usuario.nome,
          Cliente_Info:JSON.stringify({nome:dados.nomeCliente||'',telefone:dados.telefone||'',endereco:dados.endereco||''}),
          Itens_Comprados:JSON.stringify(dados.itens||[]),
          Total_Final:res.total||0,
          Metodo_Pagamento:dados.pagamento||'',
          Status:'NOVO', Desconto:dados.desconto||0,
          Taxa_Entrega:dados.taxaEntrega||0,
          Subtotal:res.total-(dados.taxaEntrega||0), Cancelado_Por:''
        };
        if(!ST.dados) ST.dados={};
        if(!ST.dados.pedidosDia) ST.dados.pedidosDia={pedidos:[],resumo:{}};
        if(!ST.dados.pedidosDia.pedidos) ST.dados.pedidosDia.pedidos=[];
        ST.dados.pedidosDia.pedidos.unshift(novoItemDel);
        if(ST.abaAtiva!=='abaPedidos') navegarPara('abaPedidos');
        else renderPedidosDia();

        msg.innerHTML='<p class="text-sm text-red"><i class="fa-solid fa-circle-xmark"></i> '+esc(res.mensagem)+'</p>';
      }
    })
    .catch(function(e){
      ST.registrando=false;

      msg.innerHTML='<p class="text-sm text-red">Erro: '+esc(e)+'</p>';
    });
}

// Cupom genérico
// ST._cupomAtivo guarda tipo e valor para recálculo dinâmico de %
function aplicarCupom(inputId,hiddenId,msgId,callback){
  var codigo=document.getElementById(inputId).value.trim();
  var msgEl=document.getElementById(msgId);
  if(!codigo){ msgEl.innerHTML='<span class="text-red">Digite um código.</span>'; return; }
  msgEl.innerHTML='<span class="text-muted">Verificando...</span>';
  api('GET', L('/cupons/validar?codigo=') + encodeURIComponent(codigo))
    .then(function(res){
      if(res.valido){
        // Armazena cupom ativo para uso no calcBalcao/calcDelivery
        ST._cupomAtivo={ hiddenId:hiddenId, tipo:res.tipo, valor:res.valor };
        // Se VALOR fixo: já seta o hidden; se PERCENTUAL: será calculado no calc*
        if(res.tipo!=='PERCENTUAL') document.getElementById(hiddenId).value=res.valor;
        msgEl.innerHTML='<span class="text-green"><i class="fa-solid fa-check"></i> '+esc(res.mensagem)+'</span>';
        if(callback) callback();
      } else {
        ST._cupomAtivo=null;
        document.getElementById(hiddenId).value=0;
        msgEl.innerHTML='<span class="text-red"><i class="fa-solid fa-xmark"></i> '+esc(res.mensagem)+'</span>';
        if(callback) callback();
      }
    })
    .catch(function(){ msgEl.innerHTML='<span class="text-red">Erro ao validar cupom.</span>'; });
}

function renderSecaoDelivery(){

  var btnCarteira = (ST.usuario && ST.usuario.cargo === 'Entregador') ? '<button class="btn btn-primary" onclick="abrirCarteiraEntregador()"><i class="fa-solid fa-wallet"></i> Minha Carteira</button>' : '';

  '<div class="page-content">'+
    '<div class="stat-grid" id="deliveryStats"></div>'+

  '</div>';

function recarregarDelivery(){
  var lista=document.getElementById('listaDelivery');
  if(lista) lista.innerHTML='<div style="text-align:center;padding:30px"><div class="spinner" style="margin:auto"></div></div>';
  api('GET', L('/delivery-ativo'))
    .then(function(res){
      if(ST.dados) ST.dados.deliveryAtivo=res;
      renderDelivery();
    })
    .catch(function(){ renderDelivery(); });
}

function renderDelivery(){
  var pedidos=(ST.dados&&ST.dados.deliveryAtivo)||[];
  var stats=document.getElementById('deliveryStats');
  var lista=document.getElementById('listaDelivery');
  if(!lista) return;

  // Esconde os "ENTREGUE" e não mostra os pedidos que são para "Retirada na loja"
  var pedidosVisiveis = pedidos.filter(function(p){ 
      if ((p.Status||'').toUpperCase() === 'ENTREGUE') return false;
      var cli = parseCliente(p.Cliente_Info);
      if (cli.endereco === 'Retirada na loja') return false;
      return true; 
  });

  if(stats){
    var novo=pedidosVisiveis.filter(function(p){ return (p.Status||'').toUpperCase()==='NOVO'; }).length;
    var montagem=pedidosVisiveis.filter(function(p){ return (p.Status||'').toUpperCase()==='EM_MONTAGEM'; }).length;
    var caminho=pedidosVisiveis.filter(function(p){ return (p.Status||'').toUpperCase()==='A_CAMINHO'; }).length;
    stats.innerHTML=
      statMini('fa-circle-dot','Novos','stat-blue',novo)+
      statMini('fa-box','Montagem','stat-purple',montagem)+
      statMini('fa-motorcycle','A Caminho','stat-orange',caminho)+
      statMini('fa-boxes-stacked','Total Ativo','stat-green',pedidosVisiveis.length);
  }

  if(!pedidosVisiveis.length){
    lista.innerHTML='<div class="empty-state"><i class="fa-solid fa-motorcycle"></i><p>Nenhum pedido de delivery em andamento</p></div>';
    return;
  }

  var ordenados=pedidosVisiveis.slice().sort(function(a,b){
    var ordem={NOVO:0,EM_MONTAGEM:1,A_CAMINHO:2};
    var oa=ordem[(a.Status||'').toUpperCase()]||3;
    var ob=ordem[(b.Status||'').toUpperCase()]||3;
    function _sk(s){ var p=(s||'').split(' ');var d=p[0].split('/');return (d[2]||'')+'/'+(d[1]||'')+'/'+(d[0]||'')+' '+(p[1]||''); }
    return oa-ob||_sk(b.Data_Hora||'').localeCompare(_sk(a.Data_Hora||''));
  });

  lista.innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px">'+
    ordenados.map(renderDeliveryCard).join('')+'</div>';
}

function statMini(icon,label,cls,val){
  return '<div class="stat-card '+cls+'"><div class="stat-icon"><i class="fa-solid '+icon+'"></i></div>'+
    '<div class="stat-label">'+label+'</div><div class="stat-value">'+val+'</div></div>';
}

function renderDeliveryCard(p){
  var cli=parseCliente(p.Cliente_Info);
  var st=(p.Status||'').toUpperCase();
  var entregador=(p.Entregador_Nome||'').toString().trim();
  var meuNome=ST.usuario.nome;
  var jaPego=entregador!=='';
  var euPeguei=entregador.toLowerCase()===meuNome.toLowerCase();
  var podeVer=(st==='EM_MONTAGEM'||st==='A_CAMINHO');
  var podePegar=(st==='NOVO'&&!jaPego)||euPeguei;

  var entregadorHTML=jaPego
    ? '<div class="entregador-chip"><i class="fa-solid fa-person-biking"></i>'+esc(entregador)+'</div>'
    : '<span style="font-size:12px;color:#9ca3af"><i class="fa-solid fa-circle-dot"></i> Aguardando entregador</span>';

  return '<div class="delivery-card'+(jaPego?' picked':'')+'">'+
    '<div class="flex justify-between items-center mb-3">'+
      '<div>'+
        '<div style="font-size:11px;font-weight:700;color:#9ca3af">'+esc(p.ID_Venda)+'</div>'+

function pegarDelivery(idVenda){
  api('POST', L('/pedidos/') + idVenda + '/pegar-delivery', { nomeEntregador: ST.usuario.nome })
    .then(function(res){
      if(res.sucesso){
        toast('Pedido atribuído a você!','success');
        recarregarDelivery();
        // Bloqueia a impressão se for Entregador, evitando o erro de "null is not an object" pelo celular
        if(ST.usuario && ST.usuario.cargo !== 'Entregador' && ST.dados && ST.dados.configuracoes && ST.dados.configuracoes.AutoImprimir_Delivery === 'SIM') {
            var pedPrint = (ST.dados.deliveryAtivo||[]).find(function(p){ return p.ID_Venda === idVenda; });
            if(pedPrint) imprimirCupom(pedPrint);
        }
      } else {
        toast(res.mensagem,'error');
        recarregarDelivery();
      }
    })
    .catch(function(e){ toast('Erro: '+e,'error'); });
}

function recarregarRetirada(){
  var lista=document.getElementById('listaRetirada');
  if(lista) lista.innerHTML='<div style="text-align:center;padding:30px"><div class="spinner" style="margin:auto"></div></div>';
  api('GET', L('/pedidos/dia'))
    .then(function(res){
      if(ST.dados) ST.dados.pedidosDia=res;
      renderRetirada();
    })
    .catch(function(){ renderRetirada(); });
}

function renderRetirada(){
  var todos = (ST.dados && ST.dados.pedidosDia && ST.dados.pedidosDia.pedidos) || [];
  var pedidos = todos.filter(function(p){
     if((p.Origem||'').toUpperCase() !== 'ONLINE') return false;
     if((p.Status||'').toUpperCase() === 'ENTREGUE' || (p.Status||'').toUpperCase() === 'CANCELADO') return false;
     var cli = parseCliente(p.Cliente_Info);
     return cli.endereco === 'Retirada na loja';
  });

  var stats=document.getElementById('retiradaStats');
  var lista=document.getElementById('listaRetirada');
  if(!lista) return;

  if(stats){
    var novo=pedidos.filter(function(p){ return (p.Status||'').toUpperCase()==='NOVO'; }).length;
    var prep=pedidos.filter(function(p){ return (p.Status||'').toUpperCase()==='EM_MONTAGEM' || (p.Status||'').toUpperCase()==='PREPARANDO'; }).length;
    var pronto=pedidos.filter(function(p){ return (p.Status||'').toUpperCase()==='PRONTO'; }).length;
    stats.innerHTML=
      statMini('fa-circle-dot','Novos','stat-blue',novo)+
      statMini('fa-fire-burner','Preparando','stat-purple',prep)+
      statMini('fa-box-open','Prontos','stat-green',pronto)+
      statMini('fa-store','Total Ativo','stat-orange',pedidos.length);
  }

  if(!pedidos.length){
    lista.innerHTML='<div class="empty-state"><i class="fa-solid fa-store text-purple-200"></i><p>Nenhum pedido para retirada no momento</p></div>';
    return;
  }

  var ordenados=pedidos.slice().sort(function(a,b){
    var ordem={NOVO:0,PREPARANDO:1,EM_MONTAGEM:1,PRONTO:2};
    var oa=ordem[(a.Status||'').toUpperCase()]||3;
    var ob=ordem[(b.Status||'').toUpperCase()]||3;
    function _sk(s){ var p=(s||'').split(' ');var d=p[0].split('/');return (d[2]||'')+'/'+(d[1]||'')+'/'+(d[0]||'')+' '+(p[1]||''); }
    return oa-ob||_sk(b.Data_Hora||'').localeCompare(_sk(a.Data_Hora||''));
  });

  lista.innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px">'+
    ordenados.map(renderRetiradaCard).join('')+'</div>';
}

      '<div>'+
        '<div style="font-size:11px;font-weight:700;color:#9ca3af">'+esc(p.ID_Venda)+'</div>'+

}

function carregarRelatorio(){
  var dtIniISO=document.getElementById('rel_dtIni').value||hojeISO();
  var dtFimISO=document.getElementById('rel_dtFim').value||hojeISO();
  var params={
    dataInicio: isoParaDDMM(dtIniISO),
    dataFim:    isoParaDDMM(dtFimISO),
    pagamento:  document.getElementById('rel_pgto').value||'',
    origem:     document.getElementById('rel_origem').value||'',
    status:     document.getElementById('rel_status').value||'',
    operador:   document.getElementById('rel_operador').value||''
  };

  var tbody=document.getElementById('relTbody');
  if(tbody) tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:30px"><div class="spinner" style="margin:auto"></div></td></tr>';

  var _qRel = Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]||''); }).join('&');
  api('GET', L('/pedidos/relatorio?') + _qRel)
    .then(renderRelatorio)
    .catch(function(e){
      if(tbody) tbody.innerHTML='<tr><td colspan="8" style="text-align:center;color:#ef4444">Erro: '+esc(e)+'</td></tr>';
    });
}

function renderRelatorio(data){
  var pedidos=data.pedidos||[];
  var resumo=data.resumo||{};
  window._relatorioAtual = pedidos; // Salva para uso na impressora

  // Garante que o Entregador também seja filtrado se for digitado na barra de pesquisa
  var opSearch = (document.getElementById('rel_operador').value || '').trim().toLowerCase();
  if (opSearch) {
      pedidos = pedidos.filter(function(p) {
          var op = (p.Operador || '').toLowerCase();
          var en = (p.Entregador_Nome || '').toLowerCase();
          return op.indexOf(opSearch) > -1 || en.indexOf(opSearch) > -1;
      });
  }

  // Cards de resumo
  var sc=document.getElementById('relSummaryCards');
  if(sc){
    sc.innerHTML=
      statCardRel('fa-money-bill-wave','Total de Vendas','stat-green',fmtMoeda(resumo.totalVendas||0),'')+
      statCardRel('fa-receipt','Pedidos','stat-purple',(resumo.qtdPedidos||0),'no período')+
      statCardRel('fa-tag','Descontos','stat-orange',fmtMoeda(resumo.totalDescontos||0),'')+
      statCardRel('fa-chart-line','Ticket Médio','stat-blue',fmtMoeda(resumo.ticketMedio||0),'por pedido');
  }

  // Breakdown
  var bd=document.getElementById('relBreakdown');
  if(bd){
    bd.innerHTML=
      breakCard('Por Origem',resumo.porOrigem||{},'fa-globe')+
      breakCard('Por Pagamento',resumo.porPagamento||{},'fa-credit-card');
  }

  // Tabela

function fGroup(label,id,type,val,ph){

}
function fGroupSel(label,id,opts,val){
  return '<div class="form-group"><label class="form-label">'+label+'</label><select class="form-control" id="'+id+'">'+
    opts.map(function(o){ return '<option'+(o===val?' selected':'')+'>'+esc(o)+'</option>'; }).join('')+'</select></div>';
}

function chamarSalvar(fn,dados,tbodyId,renderFn,modalId,cacheKey){
  var btn=document.querySelector('#'+modalId+' .btn-primary');
  if(btn){ btn.disabled=true; btn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px"></div>Salvando...'; }
  var mapeamento = _FN_MAP[fn];
  if(!mapeamento){ toast('Função não mapeada: '+fn,'error'); if(btn){ btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-check"></i>Salvar'; } return; }
  var endpoint = mapeamento[0], method = mapeamento[1];
  api(method, endpoint, dados)
    .then(function(res){
      if(btn){ btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-check"></i>Salvar'; }
      if(res.sucesso){
        fecharModal(modalId); toast(res.mensagem,'success');
        recarregarDadosEAtualizar(tbodyId,renderFn,cacheKey);
      } else {
        var msgEl=document.getElementById('formMsg');
        if(msgEl) msgEl.innerHTML='<p class="text-sm text-red">'+esc(res.mensagem)+'</p>';
      }
    })
    .catch(function(e){
      if(btn){ btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-check"></i>Salvar'; }
      var msgEl=document.getElementById('formMsg');
      if(msgEl) msgEl.innerHTML='<p class="text-sm text-red">Erro: '+esc(e)+'</p>';
    });
}

function recarregarDadosEAtualizar(tbodyId,renderFn,cacheKey){
  var endpoint = _CACHE_ENDPOINT[cacheKey];
  if(!endpoint){ return; }
  api('GET', L(endpoint))
    .then(function(novos){
      if(ST.dados&&cacheKey) {
        ST.dados[cacheKey] = (cacheKey === 'itensFixos' && !Array.isArray(novos)) ? (novos.prontos || []) : novos;
      }
      var tbody=document.getElementById(tbodyId);
      if(tbody&&renderFn) tbody.innerHTML=renderFn();
    })
    .catch(function(){});
}

function confirmarExcluir(aba,id,nome,fn){
  // Otimização: Previne vazamento de memória limpando modais zumbis anteriores
  var oldOverlay = document.getElementById('confirmOverlayExcluir');
  if(oldOverlay) oldOverlay.remove();
  
  var overlay=document.createElement('div');
  overlay.id = 'confirmOverlayExcluir';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML='<div style="background:#fff;border-radius:16px;padding:28px 32px;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)">'
    +'<div style="width:48px;height:48px;background:#fef2f2;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px"><i class="fa-solid fa-trash" style="color:#ef4444;font-size:20px"></i></div>'
    +'<p style="font-weight:800;font-size:16px;color:#1e1b4b;margin-bottom:8px">Confirmar exclusão</p>'
    +'<p style="font-size:13px;color:#6b7280;margin-bottom:24px">Excluir <strong>'+esc(nome)+'</strong>?<br>Esta ação não pode ser desfeita.</p>'
    +'<div style="display:flex;gap:10px;justify-content:center">'
    +'<button id="_cancelDel" style="padding:10px 20px;border-radius:10px;border:1.5px solid #e5e7eb;background:#fff;font-weight:700;cursor:pointer;font-family:inherit">Cancelar</button>'
    +'<button id="_confirmDel" style="padding:10px 20px;border-radius:10px;border:none;background:#ef4444;color:#fff;font-weight:700;cursor:pointer;font-family:inherit">Excluir</button>'
    +'</div></div>';
  document.body.appendChild(overlay);
  document.getElementById('_cancelDel').onclick=function(){ document.body.removeChild(overlay); };
  document.getElementById('_confirmDel').onclick=function(){
    document.body.removeChild(overlay);
    var mapDel = _FN_MAP[fn];
    if(!mapDel){ toast('Função não mapeada: '+fn,'error'); return; }
    api('DELETE', mapDel[0] + '/' + encodeURIComponent(id))
      .then(function(res){
        if(res.sucesso){
          toast('Excluído com sucesso!','success');
          if(ST.abaAtiva==='abaMonteAcai')       recarregarMonteAcai();
          else if(ST.abaAtiva==='abaItens')       recarregarItens();
          else if(ST.abaAtiva==='abaPedidos')     recarregarPedidosDia();
          else if(ST.abaAtiva==='abaDelivery')    recarregarDelivery();
          else if(ST.abaAtiva==='abaRelatorios')  carregarRelatorio();
          else if(ST.abaAtiva==='abaConfig')      recarregarConfig();
          else navegarPara(ST.abaAtiva);
        } else toast(res.mensagem,'error');
      })
      .catch(function(e){ toast('Erro: '+e,'error'); });
  };
}

function abrirFormModelo(id){
  var d=id?((ST.dados&&ST.dados.acaiModelos)||[]).find(function(x){ return x.ID_Modelo===id; }):null;
  var cats=(ST.dados&&ST.dados.acaiCategorias)||[];

  // Parse Limites_JSON existente para pré-preencher
  var limitesAtual={};
  if(d&&d.Limites_JSON){
    try{
      var parsed=JSON.parse(d.Limites_JSON);
      Object.keys(parsed).forEach(function(k){
        var v=parsed[k];
        if(typeof v==='object'&&v!==null){ limitesAtual[k.toLowerCase()]={min:parseInt(v.min||0),max:parseInt(v.max||99)}; }
        else{ limitesAtual[k.toLowerCase()]={min:0,max:parseInt(v)||99}; }
      });
    }catch(e){}
  }

  var tabelaCats='';
  if(cats.length===0){
    tabelaCats='<div style="padding:12px;background:#fef9c3;border:1px solid #fde047;border-radius:10px;font-size:12px;color:#854d0e;font-weight:600;">'
      +'<i class="fa-solid fa-triangle-exclamation" style="margin-right:6px"></i>'
      +'Nenhuma categoria cadastrada. Crie em <strong>Monte A&ccedil;a&iacute; &rarr; Categorias</strong> primeiro.</div>';
  } else {
    tabelaCats=
      '<div style="border:1.5px solid #e9d5ff;border-radius:14px;overflow:hidden;margin-top:4px">'
      +'<div style="display:grid;grid-template-columns:1fr 110px 110px;background:#f5f3ff;padding:8px 14px;border-bottom:1px solid #e9d5ff">'
      +'<span style="font-size:11px;font-weight:800;color:#6b21a8;text-transform:uppercase;letter-spacing:.4px">Categoria</span>'
      +'<span style="font-size:11px;font-weight:800;color:#6b21a8;text-transform:uppercase;letter-spacing:.4px;text-align:center">M\u00ednimo</span>'
      +'<span style="font-size:11px;font-weight:800;color:#6b21a8;text-transform:uppercase;letter-spacing:.4px;text-align:center">M\u00e1ximo</span>'
      +'</div>';
    cats.forEach(function(cat,idx){
      var nomeCat=cat.Nome_Categoria||cat.Nome||'';
      var chave=nomeCat.toLowerCase();
      var limCat=limitesAtual[chave]||{min:0,max:99};
      var maxVal=limCat.max===99?'':limCat.max;
      var bg=idx%2===0?'#ffffff':'#faf5ff';
      tabelaCats+=
        '<div style="display:grid;grid-template-columns:1fr 110px 110px;background:'+bg+';padding:10px 14px;border-bottom:1px solid #f3e8ff;align-items:center">'
        +'<span style="font-size:13px;font-weight:700;color:#374151">'+esc(nomeCat)+'</span>'

function salvarModelo(){
  var nome=document.getElementById('f_nome').value.trim();
  if(!nome){ document.getElementById('formMsg').innerHTML='<p class="text-sm text-red">Nome obrigat\u00f3rio.</p>'; return; }
  var cats=(ST.dados&&ST.dados.acaiCategorias)||[];
  var limitesObj={};
  cats.forEach(function(cat){
    var nomeCat=cat.Nome_Categoria||cat.Nome||'';
    var inMin=document.getElementById('lim_min_'+cat.ID_Categoria);
    var inMax=document.getElementById('lim_max_'+cat.ID_Categoria);
    if(!inMin||!inMax) return;
    var minV=parseInt(inMin.value)||0;
    var maxV=inMax.value.trim()===''?99:parseInt(inMax.value)||99;
    if(minV>0||maxV!==99) limitesObj[nomeCat]={min:minV,max:maxV};
  });
  var limitesJSON=Object.keys(limitesObj).length>0?JSON.stringify(limitesObj):'';
  var d={
    ID_Modelo:    document.getElementById('f_id').value,
    Nome:         nome,
    Descricao:    document.getElementById('f_desc').value.trim(),
    Preco_Base:   parseFloat(document.getElementById('f_preco').value)||0,
    Ordem:        parseInt(document.getElementById('f_ordem').value)||0,
    Limites_JSON: limitesJSON,
    Foto:         document.getElementById('f_foto').value.trim(),
    Disponivel:   document.getElementById('f_disp').value
  };
  var btn=document.querySelector('#modalFormCrud .btn-primary');
  if(btn){ btn.disabled=true; btn.innerHTML='<div class="spinner" style="width:16px;height:16px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px"></div>Salvando...'; }
  api('POST', L('/acai-modelos'), d)
    .then(function(res){
      if(res.sucesso){ fecharModal('modalFormCrud'); toast(res.mensagem,'success'); recarregarMonteAcai(); }
      else{ document.getElementById('formMsg').innerHTML='<p class="text-sm text-red">'+esc(res.mensagem)+'</p>'; if(btn){btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-check"></i>Salvar';} }
    })
    .catch(function(){ document.getElementById('formMsg').innerHTML='<p class="text-sm text-red">Erro ao salvar. Tente novamente.</p>'; if(btn){btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-check"></i>Salvar';} });
}

    'WhatsApp_Link':   document.getElementById('cfg_wpp_link')  ? document.getElementById('cfg_wpp_link').value.trim()  : '',

    'AutoImprimir_Delivery': document.getElementById('cfg_print_delivery') ? document.getElementById('cfg_print_delivery').value : 'NAO',
    'Mostrar_AcaiRapido_PDV': document.getElementById('cfg_acai_rapido') ? document.getElementById('cfg_acai_rapido').value : 'SIM',
    'PIX_Modo':            document.getElementById('cfg_pix_modo')   ? document.getElementById('cfg_pix_modo').value   : 'MANUAL',
    'MP_AccessToken':      document.getElementById('cfg_mp_token')   ? document.getElementById('cfg_mp_token').value   : ''
  };
  var msg=document.getElementById('cfgMsg');
  msg.innerHTML='<div class="flex items-center gap-2 text-muted text-sm"><div class="spinner" style="width:18px;height:18px;border-width:2px"></div>Salvando...</div>';
  api('POST', L('/configuracoes'), dados)
